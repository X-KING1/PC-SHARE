<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Meeting</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { overflow: hidden; }
  </style>
</head>
<body class="bg-black text-white">
  
  <!-- Join Screen -->
  <div id="joinSection" class="flex items-center justify-center h-screen bg-gradient-to-br from-blue-600 to-blue-800">
    <div class="bg-white text-gray-800 rounded-xl shadow-2xl p-8 w-96">
      <div class="text-center mb-6">
        <div class="w-16 h-16 bg-blue-600 rounded-xl mx-auto mb-3 flex items-center justify-center text-3xl">
          📹
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Join Meeting</h1>
      </div>
      <div class="space-y-4">
        <input 
          type="text" 
          id="userName" 
          placeholder="Enter your name"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
        <select 
          id="userRole"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
          <option value="student">Student</option>
          <option value="mentor">Mentor</option>
        </select>
        <input 
          type="text" 
          id="roomId" 
          placeholder="Meeting ID"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
        <button 
          id="joinBtn"
          class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold transition shadow-lg"
        >
          Join Meeting
        </button>
      </div>
    </div>
  </div>

  <!-- Main Meeting Screen -->
  <div id="mainContent" class="hidden h-screen flex flex-col">
    
    <!-- Top Bar -->
    <div class="flex justify-between items-center px-4 py-2" style="background: #1c1e20;">
      <div class="flex items-center gap-2">
        <span class="text-green-500 text-xs">🔒</span>
        <span class="text-white text-xs font-medium" id="roomIdDisplay"></span>
      </div>
      <div id="timer" class="flex items-center gap-2 text-xs text-gray-300">
        <span>🔴</span>
        <span id="timerDisplay">00:00</span>
      </div>
      <div class="flex items-center gap-2">
        <!-- Empty space for symmetry -->
      </div>
    </div>

    <!-- Video Area -->
    <div class="flex-1 relative" style="background: #0d0d0d; height: calc(100vh - 130px);">
      <!-- Main Video (Remote) -->
      <div class="absolute inset-0">
        <video 
          id="remoteVideo" 
          autoplay 
          playsinline
          class="w-full h-full object-cover"
        ></video>
        <div class="absolute bottom-3 left-3 bg-black bg-opacity-70 px-2 py-1 rounded text-sm flex items-center gap-2">
          <span id="remoteName" class="font-normal">Waiting for others...</span>
          <span id="remoteMicStatus"></span>
          <span id="remoteCamStatus"></span>
        </div>
        <div id="raiseHandIndicator" class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-yellow-400 text-black px-4 py-2 rounded-full font-bold shadow-lg hidden animate-bounce">
          ✋ Hand Raised
        </div>
      </div>

      <!-- Self View (Picture-in-Picture) -->
      <div id="localVideoContainer" class="absolute top-4 right-4 w-64 rounded-lg overflow-hidden shadow-2xl border-2 border-gray-700 cursor-move">
        <video 
          id="localVideo" 
          autoplay 
          muted 
          playsinline
          class="w-full aspect-video object-cover bg-gray-900"
        ></video>
        <div class="absolute bottom-2 left-2 bg-black bg-opacity-70 px-2 py-1 rounded text-xs flex items-center gap-1">
          <span id="localName">You</span>
          <span id="localMicStatus">🎤</span>
          <span id="localCamStatus">📹</span>
        </div>
        <div id="myHandIndicator" class="absolute top-2 right-2 bg-yellow-400 text-black px-2 py-1 rounded-full font-bold text-xs hidden">
          ✋
        </div>
      </div>

      <!-- Side Panel (Chat/Participants) -->
      <div id="sidePanel" class="absolute top-0 right-0 h-full w-80 bg-gray-900 shadow-2xl transform translate-x-full transition-transform duration-300">
        <!-- Tabs -->
        <div class="flex border-b border-gray-700">
          <button id="chatTab" class="flex-1 py-3 text-sm font-medium border-b-2 border-blue-500">
            Chat
          </button>
          <button id="participantsTab" class="flex-1 py-3 text-sm font-medium text-gray-400">
            Participants
          </button>
        </div>

        <!-- Chat Content -->
        <div id="chatContent" class="flex flex-col h-full">
          <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-3" style="height: calc(100vh - 180px);">
            <!-- Messages here -->
          </div>
          <div class="p-4 border-t border-gray-700">
            <div class="flex gap-2 mb-2">
              <input 
                type="file" 
                id="fileInput" 
                class="hidden"
                accept="image/*,.pdf,.doc,.docx,.txt"
              >
              <button 
                id="attachBtn"
                class="px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg transition text-sm"
              >
                📎
              </button>
              <input 
                type="text" 
                id="chatInput" 
                placeholder="Type message here..."
                class="flex-1 px-3 py-2 rounded-lg bg-gray-800 border border-gray-700 focus:outline-none focus:border-blue-500 text-sm"
              >
              <button 
                id="sendChatBtn"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg transition text-sm font-medium"
              >
                Send
              </button>
            </div>
            <div id="filePreview" class="hidden bg-gray-800 p-2 rounded text-xs flex items-center gap-2">
              <span id="fileName"></span>
              <button id="removeFile" class="text-red-500 hover:text-red-400">✕</button>
            </div>
          </div>
        </div>

        <!-- Participants Content -->
        <div id="participantsContent" class="hidden p-4">
          <div class="mb-3 text-sm text-gray-400">
            In meeting: <span id="participantCount" class="text-white font-medium">1</span>
          </div>
          <div id="participantList" class="space-y-2">
            <!-- Participants here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Control Bar -->
    <div class="px-4 py-4 flex justify-center items-center gap-2" style="background: #1c1e20;">
      
      <button id="muteBtn" class="flex flex-col items-center gap-1 px-5 py-3 rounded-lg bg-gray-700 hover:bg-gray-600 text-white transition cursor-pointer min-w-[80px]">
        <span class="text-2xl" id="muteIcon">🎤</span>
        <span class="text-xs">Unmute</span>
      </button>
      
      <button id="videoBtn" class="flex flex-col items-center gap-1 px-5 py-3 rounded-lg bg-gray-700 hover:bg-gray-600 text-white transition cursor-pointer min-w-[80px]">
        <span class="text-2xl" id="videoIcon">📹</span>
        <span class="text-xs">Start Video</span>
      </button>
      
      <button id="toggleParticipantsBtn2" class="flex flex-col items-center gap-1 px-5 py-3 rounded-lg bg-gray-700 hover:bg-gray-600 text-white transition cursor-pointer min-w-[80px]">
        <span class="text-2xl">👥</span>
        <span class="text-xs">Participants</span>
      </button>
      
      <button id="toggleChatBtn2" class="flex flex-col items-center gap-1 px-5 py-3 rounded-lg bg-gray-700 hover:bg-gray-600 text-white transition cursor-pointer min-w-[80px] relative">
        <span class="text-2xl">💬</span>
        <span class="text-xs">Chat</span>
        <span id="chatBadge" class="hidden absolute top-1 right-1 bg-red-600 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
      </button>
      
      <button id="raiseHandBtn" class="flex flex-col items-center gap-1 px-5 py-3 rounded-lg bg-gray-700 hover:bg-gray-600 text-white transition cursor-pointer min-w-[80px]">
        <span class="text-2xl">😊</span>
        <span class="text-xs">Reactions</span>
      </button>
      
      <button id="screenShareBtn" class="flex flex-col items-center gap-1 px-5 py-3 rounded-lg bg-gray-700 hover:bg-gray-600 text-white transition cursor-pointer min-w-[90px]">
        <span class="text-2xl text-green-400">⬆️</span>
        <span class="text-xs">Share Screen</span>
      </button>
      
      <button id="recordBtn" class="flex flex-col items-center gap-1 px-5 py-3 rounded-lg bg-gray-700 hover:bg-gray-600 text-white transition cursor-pointer min-w-[80px]">
        <span class="text-2xl">⏺️</span>
        <span class="text-xs">Record</span>
      </button>
      
      <button id="hangupBtn" class="flex flex-col items-center gap-1 px-6 py-3 rounded-lg bg-red-600 hover:bg-red-700 text-white transition cursor-pointer min-w-[100px]">
        <span class="text-xs font-medium">End</span>
      </button>
      
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
